<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/F_Logo_Flais.png" />

  <!-- Security Headers (Server-side handled in production) -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' http://localhost:8000; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.google.com https://translate.google.com https://translate.googleapis.com https://translate-pa.googleapis.com https://translate-a.translate.google.com https://translate-b.translate.google.com https://www.googletagmanager.com https://www.google-analytics.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com https://www.gstatic.com; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://translate.gstatic.com data:; img-src 'self' data: https: blob: http://localhost:8000; media-src 'self' http://localhost:8000 https:; connect-src 'self' https://www.google.com https://translate.google.com https://translate.googleapis.com https://translate-pa.googleapis.com https://translate-a.translate.google.com https://translate-b.translate.google.com https://www.google-analytics.com https://www.googletagmanager.com https://res.cloudinary.com http://localhost:8000 wss: https:; frame-src 'self' https://translate.google.com https://www.google.com https://maps.google.com https://www.googletagmanager.com; base-uri 'self'; form-action 'self';" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FLAIS GRANITO | Premium Tiles for Modern Living</title>
  <meta name="description"
    content="FLAIS GRANITO offers a wide range of premium floor, wall, bathroom, and kitchen tiles. Discover exquisite designs and durable solutions for your home or commercial projects." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Suppress Google Translate toolbar -->
  <style>
    .goog-te-banner-frame,
    .goog-te-balloon-frame,
    #goog-gt-tt {
      display: none !important;
    }

    .skiptranslate {
      display: none !important;
    }

    body {
      top: 0 !important;
    }

    #google_translate_element {
      display: none !important;
    }
  </style>

  <!-- Security: Initialize empty for translate -->
  <script>
    window.googleTranslateElementInit = function () {
      if (window.google && window.google.translate && window.google.translate.TranslateElement) {
        new window.google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: '',
          layout: window.google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    };
  </script>

  <!-- Google Translate Script (async with integrity checks) -->
  <script async src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <!-- Favicon Script with Security -->
  <script>
    (function () {
      try {
        var img = new Image();
        img.src = '/F_Logo_Flais.png';
        img.crossOrigin = 'anonymous';
        img.onload = function () {
          var canvas = document.createElement('canvas');
          canvas.width = 32;
          canvas.height = 32;
          var ctx = canvas.getContext('2d');
          var size = img.height;
          ctx.drawImage(img, 0, 0, size, size, 0, 0, 32, 32);
          var link = document.querySelector("link[rel*='icon']");
          if (link) {
            link.href = canvas.toDataURL('image/png');
          }
        };
      } catch (e) {
      }
    })();
  </script>
</head>

<body>
  <div id="google_translate_element"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
